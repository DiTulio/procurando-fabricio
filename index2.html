<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <Header>
    <h1> Loja de produtos</h1>
    <p>Escolha seu produto favorito</p>
    </Header>

    <main>
        <section class="produtos">
            <div class="card">
                <h2>Fone de Ouvido</h2>
                <p class="descricao">Fone confortável com ótima qualidade</p>
                <input type="text" placeholder="Digite seu nome">
                <button>Comprar</button>
            </div>
           
            <div class="card">
                <h2>Mouse gamer</h2>
                <p class="descricao">Mouse confortável com ótima qualidade.</p>
                <input type="text" placeholder="Digite seu nome">
                <button>Comprar</button>
            </div>

            <div class="card">
                <h2>Teclado mecânico</h2>
                <p class="descricao">Teclado resistente com tecnologia de cores rgb</p>
                <input type="text" placeholder="Digite seu nome">
                <button>Comprar</button>
            </div>

        </section>
    </main>
</body>
</html>
